<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — Creative Aperture Production</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #080808;
      --offwhite: #f0ece4;
      --gold: #c9a84c;
      --gold-dim: #8a6f32;
      --muted: #888;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--offwhite);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      border-bottom: 1px solid #1a1a1a;
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.96);
      backdrop-filter: blur(12px);
      z-index: 50;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--offwhite);
      text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }
    .nav-cta {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold-dim);
      padding: 10px 22px;
      transition: all 0.3s ease;
    }
    .nav-cta:hover { background: var(--gold); color: var(--black); }

    /* HEADER */
    .page-header {
      padding: 72px 48px 48px;
      border-bottom: 1px solid #1a1a1a;
    }
    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .eyebrow::after { content: ''; width: 40px; height: 1px; background: var(--gold-dim); }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
    }
    .page-title em { font-style: italic; color: var(--gold); }

    /* FILTERS */
    .filters {
      padding: 32px 48px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #1a1a1a;
    }
    .filter-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .filter-btn:hover { border-color: var(--gold-dim); color: var(--offwhite); }
    .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.06); }

    /* GALLERY */
    .gallery {
      padding: 48px;
      columns: 3;
      column-gap: 10px;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
      filter: brightness(0.9);
    }
    .gallery-item:hover img { transform: scale(1.04); filter: brightness(1); }
    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(8,8,8,0.65) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 18px;
    }
    .gallery-item:hover .overlay { opacity: 1; }
    .overlay-label {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .gallery-item.hidden { display: none; }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.active { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 88vw;
      max-height: 86vh;
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none;
      border: none;
      color: var(--offwhite);
      font-size: 2rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
      line-height: 1;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid #333;
      color: var(--offwhite);
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1.4rem;
    }
    .lightbox-nav:hover { border-color: var(--gold); color: var(--gold); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      color: var(--muted);
    }

    /* CTA */
    .cta-strip {
      padding: 80px 48px;
      border-top: 1px solid #1a1a1a;
      text-align: center;
    }
    .cta-strip h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 300;
      margin-bottom: 36px;
    }
    .cta-strip h2 em { font-style: italic; color: var(--gold); }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: var(--black);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 16px 32px;
      transition: all 0.3s ease;
    }
    .btn-primary:hover { background: var(--offwhite); }

    /* FOOTER */
    footer {
      padding: 32px 48px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .footer-brand span { color: var(--gold); }
    .footer-copy { font-size: 0.68rem; color: var(--muted); }

    @media (max-width: 900px) {
      .gallery { columns: 2; padding: 24px; }
      nav, .page-header, .filters, .cta-strip, footer { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 560px) {
      .gallery { columns: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="https://aaryan5678.github.io/caps-google-static/" class="nav-logo">C<span>A</span>Ps</a>
    <a href="https://wa.me/918877013050?text=Hi%20CAPs!%20I%27d%20like%20to%20book%20your%20services." target="_blank" class="nav-cta">Book Now</a>
  </nav>

  <div class="page-header">
    <p class="eyebrow">Our Work</p>
    <h1 class="page-title">Moments we've <em>captured.</em></h1>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="weddings">Weddings</button>
    <button class="filter-btn" data-filter="portfolios">Portfolios</button>
  </div>

  <div class="gallery" id="gallery">

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(0)">
      <img src="LogoLicious_20211022_081210.png" alt="Wedding silhouette" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(1)">
      <img src="LogoLicious_20211211_034423.png" alt="Couple under stormy sky" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="portfolios" onclick="openLightbox(2)">
      <img src="LogoLicious_20220111_091403.png" alt="Bridal portrait" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Portfolios</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(3)">
      <img src="LogoLicious_20220520_064308.png" alt="Couple in pavilion" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(4)">
      <img src="LogoLicious_20221005_190806.png" alt="Groom kneeling at sunset" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="portfolios" onclick="openLightbox(5)">
      <img src="LogoLicious_20221104_065352.png" alt="Couple at dusk horizon" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Portfolios</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(6)">
      <img src="LogoLicious_20230913_073701.png" alt="Red fabric couple shoot" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(7)">
      <img src="LogoLicious_20231001_102559.png" alt="Wedding rings close-up" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

    <div class="gallery-item" data-category="portfolios" onclick="openLightbox(8)">
      <img src="LogoLicious_20240316_172044.png" alt="Couple running in field" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Portfolios</span></div>
    </div>

    <div class="gallery-item" data-category="portfolios" onclick="openLightbox(9)">
      <img src="LogoLicious_20240316_180611.png" alt="Couple with car under sky" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Portfolios</span></div>
    </div>

    <div class="gallery-item" data-category="weddings" onclick="openLightbox(10)">
      <img src="LogoLicious_20240319_083551.png" alt="Traditional couple in village" loading="lazy"/>
      <div class="overlay"><span class="overlay-label">Weddings</span></div>
    </div>

  </div>

  <div class="cta-strip">
    <h2>Love what you see? Let's create <em>your story.</em></h2>
    <a href="https://wa.me/918877013050?text=Hi%20CAPs!%20I%27d%20like%20to%20book%20a%20shoot." target="_blank" class="btn-primary">Book on WhatsApp</a>
  </div>

  <footer>
    <p class="footer-brand">Creative <span>Aperture</span> Production</p>
    <p class="footer-copy">© 2025 CAPs. All rights reserved.</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-nav lightbox-prev" onclick="navigate(-1)">‹</button>
    <img id="lightbox-img" src="" alt=""/>
    <button class="lightbox-nav lightbox-next" onclick="navigate(1)">›</button>
    <p class="lightbox-counter" id="lightbox-counter"></p>
  </div>

  <script>
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.gallery-item');
    let visibleItems = [];
    let currentIndex = 0;

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        items.forEach(item => {
          if (filter === 'all' || item.dataset.category === filter) {
            item.classList.remove('hidden');
          } else {
            item.classList.add('hidden');
          }
        });
        buildVisibleList();
      });
    });

    function buildVisibleList() {
      visibleItems = Array.from(document.querySelectorAll('.gallery-item:not(.hidden)'));
    }

    buildVisibleList();

    function openLightbox(globalIndex) {
      buildVisibleList();
      const allItems = Array.from(items);
      const clicked = allItems[globalIndex];
      currentIndex = visibleItems.indexOf(clicked);
      if (currentIndex === -1) currentIndex = 0;
      showImage();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + visibleItems.length) % visibleItems.length;
      showImage();
    }

    function showImage() {
      const img = visibleItems[currentIndex].querySelector('img');
      document.getElementById('lightbox-img').src = img.src;
      document.getElementById('lightbox-img').alt = img.alt;
      document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + visibleItems.length;
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
